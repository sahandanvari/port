  <body>
    <!-- Liquid-glass backdrop refraction (Chromium only, gated via @supports).
         Low-frequency blurred noise gives a gentle "thick pane" wobble
         instead of a harsh ripple. -->
    <svg width="0" height="0" style="position: absolute" aria-hidden="true">
      <filter
        id="liquid"
        x="-20%"
        y="-20%"
        width="140%"
        height="140%"
        color-interpolation-filters="sRGB"
      >
        <feTurbulence
          type="fractalNoise"
          baseFrequency="0.006 0.006"
          numOctaves="2"
          seed="7"
          result="noise"
        />
        <feGaussianBlur in="noise" stdDeviation="3" result="blurred" />
        <feDisplacementMap
          in="SourceGraphic"
          in2="blurred"
          scale="24"
          xChannelSelector="R"
          yChannelSelector="G"
        />
      </filter>
    </svg>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
