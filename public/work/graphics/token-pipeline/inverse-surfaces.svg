<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" role="img">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f8f8"/>
      <stop offset="100%" stop-color="#efefef"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="960" height="540" fill="url(#bg)" rx="16"/>
  
  <text x="40" y="44" fill="#111" font-family="system-ui,sans-serif" font-size="18" font-weight="700">Inverse token family (inv-)</text>
  
  <rect x="40" y="80" width="400" height="380" rx="12" fill="#fff" stroke="#ddd" filter="url(#shadow)"/>
  <text x="60" y="112" fill="#222" font-family="system-ui,sans-serif" font-size="14" font-weight="600">Default surface</text>
  <text x="60" y="138" fill="#666" font-family="system-ui,sans-serif" font-size="13">--primary</text>
  <text x="60" y="160" fill="#666" font-family="system-ui,sans-serif" font-size="13">--primary-hover</text>
  <text x="60" y="182" fill="#666" font-family="system-ui,sans-serif" font-size="13">Light canvas + OS dark toggle</text>
  
  <rect x="520" y="80" width="400" height="380" rx="12" fill="#fff" stroke="#ddd" filter="url(#shadow)"/>
  <text x="540" y="112" fill="#111" font-family="system-ui,sans-serif" font-size="14" font-weight="600">Dark-native surface</text>
  <text x="540" y="138" fill="#666" font-family="system-ui,sans-serif" font-size="13">--inv-primary</text>
  <text x="540" y="160" fill="#666" font-family="system-ui,sans-serif" font-size="13">--inv-primary-hover</text>
  <text x="540" y="182" fill="#666" font-family="system-ui,sans-serif" font-size="13">No double-invert</text>
  <rect x="120" y="200" width="120" height="40" rx="20" fill="#1e3a5f"/><text x="155" y="225" fill="#fff" font-family="system-ui,sans-serif" font-size="13">Button</text>
  <rect x="600" y="200" width="120" height="40" rx="20" fill="#e8eef8"/><text x="635" y="225" fill="#111" font-family="system-ui,sans-serif" font-size="13">Button</text>
</svg>