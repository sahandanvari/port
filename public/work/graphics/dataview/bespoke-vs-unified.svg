  <text x="280" y="160" fill="#666" font-family="system-ui,sans-serif" font-size="13">Token fights</text>
  
  <rect x="480" y="80" width="200" height="160" rx="12" fill="#fff" stroke="#ddd" filter="url(#shadow)"/>
