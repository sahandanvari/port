  <g transform="translate(300,156)"><path d="M0 0 L50 0" stroke="#666" stroke-width="2"/><polygon points="50,0 42,-4 42,4" fill="#666"/></g>
  
  <rect x="370" y="90" width="250" height="140" rx="12" fill="#fff" stroke="#ddd" filter="url(#shadow)"/>
